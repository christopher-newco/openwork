[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
# Build Next.js for server.mjs (it calls app.prepare())
cmds = ["npm run build"]

[start]
# Run our custom proxy server (calls Next.js but doesn't use it for routing)
cmd = "NODE_ENV=production node server.mjs"

[variables]
NODE_ENV = "production"
DEN_API_BASE = "https://api.admin.soapbox.build"
DEN_AUTH_ORIGIN = "https://admin.soapbox.build"
