[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
# Skip Next.js build - we don't need it for the proxy
cmds = []

[start]
# Run our custom proxy server, not Next.js static serve
cmd = "NODE_ENV=production node server.mjs"

[variables]
NODE_ENV = "production"
DEN_API_BASE = "https://api.admin.soapbox.build"
DEN_AUTH_ORIGIN = "https://admin.soapbox.build"
